version: '3.8'

services:
  # ── EXPRESS API SERVER ──────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: xdevflow-server
    restart: always
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      - PORT=5000
      - NODE_ENV=production

  # ── NEXT.JS WEB CLIENT ──────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: xdevflow-client
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - API_URL=http://server:5000
    depends_on:
      - server
